title:
  en: Tutorial
  it: Tutorial
  es: Tutorial

items:
  - id: friend
    flag: has_friend
    name:
      en: Friend
      it: Amico
      es: Amigo

  - id: key
    flag: has_key
    name:
      en: Rusty Key
      it: Chiave Arrugginita
      es: Llave Oxidada

  - id: hammer
    flag: has_hammer
    name:
      en: Hammer
      it: Martello
      es: Martillo

  - id: note
    flag: has_note
    name: 
      en: Note
      it: Biglietto
      es: Nota
    itemImageUrl:
      en: game-art/0_tutorial/tutorial_toolbox_note_en_600x400.webp
      it: game-art/0_tutorial/tutorial_toolbox_note_it_600x400.webp
      es: game-art/0_tutorial/tutorial_toolbox_note_es_600x400.webp

locations:
  - id: notice_board
    initialLocation: true
    name:
      en: Notice Board
      it: Bacheca degli Avvisi
      es: Tablón de Anuncios
    coordinates: [45.01582683234417, 8.628133553657252]
    visibleWhen: null
    grants:
      - flag: visited_start
    values:
      - when: visited_start
        content:
          en: You already read the board. Your friend, the shed, and the toolbox are nearby.
          it: Hai già letto la bacheca. Il tuo amico, il capanno e la cassetta degli attrezzi sono vicini.
          es: Ya leíste el tablón. Tu amigo, el cobertizo y la caja de herramientas están cerca.
      - when: null
        content:
          en: "A notice board describes the area. You can see a friend's house, a shed, a toolbox, and a locked gate ahead."
          it: Una bacheca descrive la zona. Puoi vedere la casa di un amico, un capanno, una cassetta degli attrezzi e un cancello chiuso davanti a te.
          es: Un tablón de anuncios describe el área. Puedes ver la casa de un amigo, un cobertizo, una caja de herramientas y una reja cerrada más adelante.

  - id: friend_house
    name:
      en: "Friend's House"
      it: "Casa dell'Amico"
      es: Casa del Amigo
    coordinates: [45.01535001146662, 8.628346083424557]
    visibleWhen: visited_start
    values:
      - when: has_friend
        content:
          en: Your friend is already with you.
          it: Il tuo amico è già con te.
          es: Tu amigo ya está contigo.
      - when: null
        content:
          en: Your friend is home and agrees to come with you.
          it: Il tuo amico è a casa e accetta di venire con te.
          es: Tu amigo está en casa y acepta acompañarte.
        grants:
          - flag: has_friend

  - id: old_shed
    name: { en: Old Shed, it: Vecchio Capanno, es: Cobertizo Viejo }
    coordinates: [45.01490700011301, 8.628122450339523]
    visibleWhen: visited_start
    values:
      - when: has_key
        content:
          en: The shed is empty. You already took the key.
          it: Il capanno è vuoto. Hai già preso la chiave.
          es: El cobertizo está vacío. Ya tomaste la llave.
      - when: talked_to_stranger
        content:
          en: The shed is empty. The stranger made sure you had no chance at the key.
          it: Il capanno è vuoto. Lo straniero si è assicurato che non avessi possibilità di prendere la chiave.
          es: El cobertizo está vacío. El extraño se aseguró de que no tuvieras oportunidad con la llave.
      - when: shed_choice_grab
        content:
          en: You manage to grab the rusty key before the stranger can react. It feels old and heavy.
          it: Riesci ad afferrare la chiave arrugginita prima che lo straniero reagisca. Sembra vecchia e pesante.
          es: Logras tomar la llave oxidada antes de que el extraño pueda reaccionar. Se siente vieja y pesada.
        grants:
          - flag: has_key
        revokes:
          - flag: shed_choice_grab
      - when: shed_choice_talk
        content:
          en: "An interesting conversation — but when you turn back, the key is gone. You will need another way to open the gate."
          it: "Una conversazione interessante — ma quando ti giri, la chiave è sparita. Dovrai trovare un altro modo per aprire il cancello."
          es: "Una conversación interesante — pero cuando te das vuelta, la llave ha desaparecido. Necesitarás otra forma de abrir la reja."
        grants:
          - flag: talked_to_stranger
        revokes:
          - flag: shed_choice_talk
      - when: null
        content:
          en: A rusty key hangs on the wall. Before you can grab it, a stranger steps in from the doorway and starts talking.
          it: Una chiave arrugginita è appesa al muro. Prima che tu possa prenderla, uno straniero entra dalla porta e inizia a parlare.
          es: Una llave oxidada cuelga de la pared. Antes de que puedas tomarla, un extraño entra por la puerta y empieza a hablar.
        choices:
          - id: grab_key
            label: { en: Slip past them and take the key, it: Aggirali e prendi la chiave, es: Escabúllete y toma la llave }
            grants:
              - flag: shed_choice_grab
          - id: talk
            label: { en: Stop and hear what they have to say, it: Fermati e ascolta cosa hanno da dire, es: Detente y escucha lo que tienen que decir }
            grants:
              - flag: shed_choice_talk

  - id: loose_dog
    type: event
    name: 
      en: Loose Dog
      it: Cane Sciolto
      es: Perro Suelto
    coordinates: [45.014486301008176, 8.62806747813587]
    visibleWhen:
      and: [visited_start, { not: dog_chased }]
    values:
      - when: has_friend
        content:
          en: "A large dog bursts from a yard and charges straight at you. Your friend panics and sprints back toward their house — you lose sight of them entirely."
          it: "Un grosso cane esce di scatto da un cortile e vi carica. Il tuo amico si fa prendere dal panico e corre verso casa sua — lo perdi completamente di vista."
          es: "Un perro grande sale disparado de un patio y se abalanza sobre ustedes. Tu amigo entra en pánico y corre de regreso a su casa — lo pierdes de vista por completo."
        imageUrl: game-art/0_tutorial/event_dog_600x400.webp
        grants:
          - flag: dog_chased
        revokes:
          - flag: has_friend
      - when: null
        content:
          en: "A large dog watches you from behind a fence, growling softly. It seems agitated — you'd rather not be here with someone else."
          it: Un grosso cane ti osserva da dietro un recinto, ringhiando piano. Sembra agitato — meglio non essere qui con qualcun altro.
          es: Un perro grande te mira desde detrás de una valla, gruñendo suavemente. Parece agitado — mejor no estar aquí con otra persona.

  - id: toolbox
    name: 
      en: Toolbox
      it: Cassetta degli Attrezzi
      es: Caja de Herramientas
    coordinates: [45.01477694667256, 8.62756105427572]
    imageUrl: game-art/0_tutorial/loc_toolbox_600x400.webp
    visibleWhen: visited_start
    values:
      - when: has_hammer
        content:
          en: The toolbox is empty. You already took the hammer.
          it: La cassetta è vuota. Hai già preso il martello.
          es: La caja de herramientas está vacía. Ya tomaste el martillo.
      - when: toolbox_pw_correct
        content:
          en: "The lock clicks open. Inside you find a heavy hammer — just what you need."
          it: "Il lucchetto scatta. Dentro trovi un pesante martello — proprio quello che ti serve."
          es: "El candado se abre. Dentro encuentras un pesado martillo — justo lo que necesitas."
        grants:
          - flag: has_hammer
        revokes:
          - flag: toolbox_pw_correct
      - when: null
        content:
          en: "A heavy toolbox sits here, locked with a combination. You'll need the code to open it."
          it: Una pesante cassetta degli attrezzi è qui, chiusa con una combinazione. Ti serve il codice per aprirla.
          es: Una pesada caja de herramientas está aquí, cerrada con combinación. Necesitas el código para abrirla.
        password:
          value: "4729"
          grants:
            - flag: toolbox_pw_correct

  - id: pinned_note
    name: 
      en: Pinned Note
      it: Biglietto Appuntato
      es: Nota Clavada
    coordinates: [45.014883616714485, 8.627320726788296]
    visibleWhen: visited_start
    grants:
      - flag: has_note
    values:
      - when: has_note
        content:
          en: You already picked up the note. Check your inventory.
          it: Hai già preso il biglietto. Controllalo nell'inventario.
          es: Ya recogiste la nota. Revísala en tu inventario.
      - when: null
        content:
          en: A handwritten note is pinned to the fence. You take it.
          it: Un biglietto scritto a mano è appuntato al recinto. Lo prendi.
          es: Una nota escrita a mano está clavada en la valla. La tomas.

  - id: locked_gate
    name: 
      en: Locked Gate
      it: Cancello Chiuso
      es: Reja Cerrada
    coordinates: [45.01368518191782, 8.62782806152771]
    visibleWhen: visited_start
    values:
      - when:
          and: [has_friend, { or: [has_key, has_hammer] }]
        content:
          en: "You and your friend force open the gate. You're through. Chapter 1 complete!"
          it: Tu e il tuo amico forzate il cancello. Ce l'avete fatta. Capitolo 1 completato!
          es: "Tú y tu amigo fuerzan la reja. ¡Lo lograron! ¡Capítulo 1 completado!"
        completesChapter: true
      - when: has_friend
        content:
          en: Your friend is here but you need a key or a hammer to open the gate.
          it: Il tuo amico è qui, ma ti serve una chiave o un martello per aprire il cancello.
          es: Tu amigo está aquí, pero necesitas una llave o un martillo para abrir la reja.
      - when:
          or: [has_key, has_hammer]
        content:
          en: You have the tool but you need your friend to help with the gate.
          it: Hai l'attrezzo, ma hai bisogno del tuo amico per aprire il cancello.
          es: Tienes la herramienta, pero necesitas a tu amigo para abrir la reja.
      - when: null
        content:
          en: "A heavy gate blocks the path. You'll need help and something to open it with."
          it: Un pesante cancello blocca il cammino. Avrai bisogno di aiuto e di qualcosa per aprirlo.
          es: Una pesada reja bloquea el camino. Necesitarás ayuda y algo para abrirla.
